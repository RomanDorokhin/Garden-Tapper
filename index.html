<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a3a1a">
<title>Garden Tapper</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  position:fixed;
  top:0;left:0;
  font-family:'Arial',sans-serif;
  touch-action:none;
  background:#0d2010;
}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px 8px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7)0%,transparent100%);
  z-index:20;
  pointer-events:none;
}
.hud-pill{
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;
  padding:6px 14px;
  display:flex;align-items:center;gap:6px;
}
.hud-pill span{font-size:18px;font-weight:900;color:#ffd600;}
.hud-pill small{font-size:11px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.8px;}

/* ── ЦЕНТРАЛЬНАЯ ЗОНА ── */
#garden{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
}

/* ── СОБЫТИЕ ── */
#event-bar{
  position:fixed;
  top:70px;left:50%;
  transform:translateX(-50%);
  z-index:25;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:6px 18px;
  font-size:13px;font-weight:700;
  color:#fff;
  white-space:nowrap;
  display:none;
  pointer-events:none;
}

/* ── ТОСТ ── */
#toast{
  position:fixed;
  top:110px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:24px;
  padding:8px 22px;
  font-size:14px;font-weight:700;color:#fff;
  z-index:50;
  opacity:0;
  transition:opacity 0.25s,transform 0.25s;
  pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CANVAS ── */
#plantCanvas{
  display:block;
  cursor:pointer;
  touch-action:none;
}

/* ── ПОЛОСА ВЛАГИ ── */
#moisture-wrap{
  width:min(280px,80vw);
  margin-top:10px;
}
#moisture-label{
  display:flex;justify-content:space-between;
  font-size:12px;color:rgba(255,255,255,0.5);
  margin-bottom:4px;
}
#moisture-bar{
  height:12px;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}
#moisture-fill{
  height:100%;
  background:linear-gradient(90deg,#1565c0,#42a5f5);
  border-radius:6px;
  width:0%;
  transition:width 0.3s;
}

/* ── МАГАЗИН ── */
#shop{
  position:fixed;
  bottom:0;left:0;right:0;
  padding:10px 12px 20px;
  background:linear-gradient(0deg,rgba(0,0,0,0.85)0%,transparent100%);
  display:flex;
  gap:8px;
  justify-content:center;
  z-index:20;
  flex-wrap:wrap;
}
.shop-btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:14px;
  padding:8px 14px;
  color:#fff;
  font-size:12px;font-weight:700;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:78px;
  transition:background 0.15s,transform 0.1s;
  touch-action:manipulation;
}
.shop-btn:active{transform:scale(0.93);background:rgba(255,255,255,0.18);}
.shop-btn.owned{border-color:rgba(76,175,80,0.5);background:rgba(76,175,80,0.12);}
.shop-btn.cant{opacity:0.4;pointer-events:none;}
.shop-btn .icon{font-size:20px;}
.shop-btn .name{font-size:11px;color:rgba(255,255,255,0.6);}
.shop-btn .cost{font-size:12px;color:#ffd600;font-weight:900;}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="hud-pill"><small>монеты</small><span id="coins-el">100</span>💰</div>
  <div class="hud-pill"><small>урожай</small><span id="yield-el">×1</span>🌾</div>
  <div class="hud-pill"><small>авто</small><span id="auto-el">0</span>⚡</div>
</div>

<!-- СОБЫТИЕ -->
<div id="event-bar"></div>

<!-- ТОСТ -->
<div id="toast"></div>

<!-- ЦЕНТР -->
<div id="garden">
  <canvas id="plantCanvas"></canvas>
  <div id="moisture-wrap">
    <div id="moisture-label"><span>💧 Влажность</span><span id="pct-el">0%</span></div>
    <div id="moisture-bar"><div id="moisture-fill"></div></div>
  </div>
</div>

<!-- МАГАЗИН -->
<div id="shop">
  <div class="shop-btn" id="btn-gardener">
    <span class="icon">👨‍🌾</span>
    <span class="name">Садовник</span>
    <span class="cost" id="cost-gardener">300💰</span>
  </div>
  <div class="shop-btn" id="btn-barrel">
    <span class="icon">🪣</span>
    <span class="name">Бочка</span>
    <span class="cost" id="cost-barrel">200💰</span>
  </div>
  <div class="shop-btn" id="btn-fruit">
    <span class="icon">🍎</span>
    <span class="name">Фрукт.сад</span>
    <span class="cost" id="cost-fruit">500💰</span>
  </div>
  <div class="shop-btn" id="btn-exotic">
    <span class="icon">🌵</span>
    <span class="name">Экзотика</span>
    <span class="cost" id="cost-exotic">2000💰</span>
  </div>
</div>

<script>
if(window.Telegram&&window.Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ══════════════════════════════════════
// ДАННЫЕ
// ══════════════════════════════════════
const G={
  coins:100,
  moisture:0,
  mature:false,
  event:'',      // '' | 'rain' | 'drought'
  eventTimer:0,
  gardener:0,    // уровень (авто-полив)
  barrel:0,      // уровень (+влага за клик)
  fruit:false,   // зона
  exotic:false,  // зона
};

// ══════════════════════════════════════
// CANVAS РАСТЕНИЯ
// ══════════════════════════════════════
const pc=document.getElementById('plantCanvas');
const pctx=pc.getContext('2d');
let CS=0; // canvas size

function resizePlant(){
  const avail=Math.min(window.innerWidth*0.55, window.innerHeight*0.38);
  CS=Math.floor(avail);
  pc.width=CS; pc.height=CS;
}

// всплывающие +монеты
const floats=[];
// частицы
const particles=[];
let plantAnim=0;
let harvestFlash=0;

function drawPlant(){
  plantAnim+=0.04;
  pctx.clearRect(0,0,CS,CS);

  const cx=CS/2, cy=CS/2;
  const r=CS*0.34;

  if(harvestFlash>0){
    harvestFlash--;
    pctx.globalAlpha=harvestFlash/15*0.5;
    pctx.fillStyle='#ffd600';
    pctx.beginPath();pctx.arc(cx,cy,r*1.4,0,Math.PI*2);pctx.fill();
    pctx.globalAlpha=1;
  }

  // земля
  pctx.fillStyle='#3e2723';
  pctx.beginPath();
  pctx.ellipse(cx,cy+r*0.85,r*0.7,r*0.18,0,0,Math.PI*2);
  pctx.fill();

  // стебель
  pctx.strokeStyle='#388e3c';
  pctx.lineWidth=CS*0.05;
  pctx.lineCap='round';
  pctx.beginPath();
  pctx.moveTo(cx,cy+r*0.75);
  const sway=Math.sin(plantAnim)*CS*0.015;
  pctx.bezierCurveTo(cx+sway,cy+r*0.3,cx-sway,cy,cx+sway*0.5,cy-r*0.2);
  pctx.stroke();

  if(!G.mature){
    // бутон
    const pct=G.moisture/100;
    const leafSize=r*(0.25+pct*0.45);
    const hue=G.event==='drought'?30:120;
    pctx.fillStyle=`hsl(${hue},60%,${35+pct*20}%)`;
    pctx.shadowColor='rgba(0,200,0,0.3)';
    pctx.shadowBlur=12;
    // левый лист
    pctx.beginPath();
    pctx.ellipse(cx-leafSize*0.8+sway,cy-r*0.05,leafSize*0.9,leafSize*0.45,-0.6,0,Math.PI*2);
    pctx.fill();
    // правый лист
    pctx.beginPath();
    pctx.ellipse(cx+leafSize*0.8+sway,cy-r*0.05,leafSize*0.9,leafSize*0.45,0.6,0,Math.PI*2);
    pctx.fill();
    pctx.shadowBlur=0;

    // центр (бутон)
    pctx.fillStyle=`hsl(${hue},55%,${28+pct*15}%)`;
    pctx.beginPath();
    pctx.arc(cx+sway*0.5,cy-r*0.22,leafSize*0.55,0,Math.PI*2);
    pctx.fill();

    // капля влаги если > 60%
    if(pct>0.6){
      pctx.fillStyle='rgba(100,180,255,0.7)';
      pctx.beginPath();
      pctx.arc(cx+r*0.3+sway,cy-r*0.5,CS*0.04,0,Math.PI*2);
      pctx.fill();
    }
  } else {
    // зрелый цветок
    const petals=8;
    const pr=r*0.38;
    pctx.shadowColor='rgba(255,200,0,0.6)';
    pctx.shadowBlur=20;
    for(let i=0;i<petals;i++){
      const a=(i/petals)*Math.PI*2+plantAnim*0.3;
      pctx.fillStyle=i%2===0?'#ffd600':'#ff8f00';
      pctx.beginPath();
      pctx.ellipse(
        cx+Math.cos(a)*pr*0.75+sway*0.5,
        cy-r*0.22+Math.sin(a)*pr*0.75,
        pr*0.42,pr*0.22,a,0,Math.PI*2
      );
      pctx.fill();
    }
    pctx.shadowBlur=0;
    // центр
    pctx.fillStyle='#ff6f00';
    pctx.beginPath();
    pctx.arc(cx+sway*0.5,cy-r*0.22,pr*0.38,0,Math.PI*2);
    pctx.fill();
    pctx.fillStyle='#fff';
    pctx.font=`bold ${CS*0.09}px Arial`;
    pctx.textAlign='center';
    pctx.textBaseline='middle';
    pctx.fillText('TAP',cx+sway*0.5,cy-r*0.22);
  }

  // частицы
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.03;
    if(p.life<=0){particles.splice(i,1);continue;}
    pctx.globalAlpha=p.life;
    pctx.fillStyle=p.color;
    pctx.beginPath();
    pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pctx.fill();
    pctx.globalAlpha=1;
  }

  // всплывающие монеты
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i];
    f.y-=1.5; f.life-=0.025;
    if(f.life<=0){floats.splice(i,1);continue;}
    pctx.globalAlpha=f.life;
    pctx.fillStyle='#ffd600';
    pctx.font=`bold ${CS*0.08}px Arial`;
    pctx.textAlign='center';
    pctx.textBaseline='middle';
    pctx.fillText(f.text,f.x,f.y);
    pctx.globalAlpha=1;
  }
}

function spawnParticles(cx,cy,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,r:2+Math.random()*4,color});
  }
}

// ══════════════════════════════════════
// ЛОГИКА
// ══════════════════════════════════════
function getYield(){
  return G.exotic?300:G.fruit?50:10;
}

function getClickMoisture(){
  return 5+(G.barrel*3)+(G.event==='rain'?3:0)-(G.event==='drought'?1:0);
}

function handlePlantClick(){
  if(G.mature){
    // сбор урожая
    const earned=getYield();
    G.coins+=earned;
    G.moisture=0;
    G.mature=false;
    harvestFlash=15;
    spawnParticles(CS/2,CS/2,'#ffd600',20);
    floats.push({x:CS/2,y:CS*0.35,text:'+'+earned+'💰',life:1});
    showToast('🌾 Собрано '+earned+' монет!');
    updateUI();
    return;
  }

  let add=getClickMoisture();
  // шанс суперполива 10%
  if(Math.random()<0.1){
    add*=2;
    spawnParticles(CS/2,CS/2,'#42a5f5',12);
    floats.push({x:CS/2,y:CS*0.3,text:'💦 ×2!',life:1});
  } else {
    spawnParticles(CS/2,CS/2,'rgba(100,200,255,0.8)',5);
  }

  G.moisture=Math.min(100,G.moisture+add);
  if(G.moisture>=100){
    G.mature=true;
    spawnParticles(CS/2,CS/2,'#ffd600',15);
    showToast('🌸 Созрело! Тапни чтобы собрать');
  }
  updateUI();
}

pc.addEventListener('touchstart',e=>{e.preventDefault();handlePlantClick();},{passive:false});
pc.addEventListener('mousedown',handlePlantClick);

// ══════════════════════════════════════
// МАГАЗИН
// ══════════════════════════════════════
const SHOP=[
  {
    id:'gardener',
    getCost:()=>300*(G.gardener+1),
    canBuy:()=>G.coins>=300*(G.gardener+1),
    buy(){
      G.coins-=300*(G.gardener+1);
      G.gardener++;
      showToast('👨‍🌾 Садовник ур.'+G.gardener+' — авто-полив!');
    },
    label:()=>G.gardener>0?'ур.'+G.gardener:'купить',
  },
  {
    id:'barrel',
    getCost:()=>200*(G.barrel+1),
    canBuy:()=>G.coins>=200*(G.barrel+1),
    buy(){
      G.coins-=200*(G.barrel+1);
      G.barrel++;
      showToast('🪣 Бочка ур.'+G.barrel+' — +'+G.barrel*3+'% за клик');
    },
    label:()=>G.barrel>0?'ур.'+G.barrel:'купить',
  },
  {
    id:'fruit',
    getCost:()=>500,
    canBuy:()=>!G.fruit&&G.coins>=500,
    buy(){
      if(G.fruit)return;
      G.coins-=500;
      G.fruit=true;
      showToast('🍎 Фруктовый сад открыт! Урожай ×5');
    },
    label:()=>G.fruit?'открыт':'купить',
  },
  {
    id:'exotic',
    getCost:()=>2000,
    canBuy:()=>!G.exotic&&G.coins>=2000,
    buy(){
      if(G.exotic)return;
      G.coins-=2000;
      G.exotic=true;
      showToast('🌵 Экзотика открыта! Урожай ×30');
    },
    label:()=>G.exotic?'открыт':'купить',
  },
];

SHOP.forEach(s=>{
  const btn=document.getElementById('btn-'+s.id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();doBuy(s);},{passive:false});
  btn.addEventListener('mousedown',e=>{e.preventDefault();doBuy(s);});
});

function doBuy(s){
  if(!s.canBuy())return;
  s.buy();
  updateUI();
}

// ══════════════════════════════════════
// UI
// ══════════════════════════════════════
function updateUI(){
  document.getElementById('coins-el').textContent=G.coins;
  document.getElementById('yield-el').textContent='×'+(G.exotic?30:G.fruit?5:1);
  document.getElementById('auto-el').textContent=G.gardener;
  document.getElementById('moisture-fill').style.width=G.moisture+'%';
  document.getElementById('pct-el').textContent=Math.round(G.moisture)+'%';

  SHOP.forEach(s=>{
    const btn=document.getElementById('btn-'+s.id);
    const costEl=document.getElementById('cost-'+s.id);
    const owned=(s.id==='fruit'&&G.fruit)||(s.id==='exotic'&&G.exotic);
    const cant=!s.canBuy()&&!owned;
    btn.className='shop-btn'+(owned?' owned':cant?' cant':'');
    costEl.textContent=owned?'✓':s.getCost()+'💰';
  });

  // событие
  const eb=document.getElementById('event-bar');
  if(G.event==='rain'){eb.style.display='block';eb.textContent='🌧️ Дождь! +3% влаги каждые 5 сек';}
  else if(G.event==='drought'){eb.style.display='block';eb.textContent='☀️ Засуха! -1% к каждому клику';}
  else{eb.style.display='none';}
}

// ══════════════════════════════════════
// ТОСТ
// ══════════════════════════════════════
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

// ══════════════════════════════════════
// АВТОПОЛИВ (садовник)
// ══════════════════════════════════════
setInterval(()=>{
  if(G.gardener>0&&!G.mature&&G.moisture<100){
    const add=G.gardener*1.5;
    G.moisture=Math.min(100,G.moisture+add);
    if(G.moisture>=100){
      G.mature=true;
      showToast('🌸 Садовник вырастил! Тапни собрать');
    }
    updateUI();
  }
},3000);

// ══════════════════════════════════════
// ДОЖДЬ
// ══════════════════════════════════════
setInterval(()=>{
  if(G.event==='rain'&&!G.mature&&G.moisture<100){
    G.moisture=Math.min(100,G.moisture+3);
    updateUI();
  }
},5000);

// ══════════════════════════════════════
// СЛУЧАЙНЫЕ СОБЫТИЯ
// ══════════════════════════════════════
setInterval(()=>{
  if(G.event)return;
  if(Math.random()<0.3){
    G.event=Math.random()<0.5?'rain':'drought';
    updateUI();
    setTimeout(()=>{G.event='';updateUI();},30000);
  }
},60000);

// ══════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  drawPlant();
}

resizePlant();
window.addEventListener('resize',()=>{resizePlant();});
updateUI();
loop();
</script>
</body>
</html>
